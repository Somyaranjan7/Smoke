
{% extends "base.html" %}

{% block content %}

<h2>

Register

</h2>

<form method="POST">

<label>

Username

</label>

<br><br>

<input
type="text"
name="username"
required>

<br><br>

<label>

Email

</label>

<br><br>

<input
type="email"
name="email"
required>

<br><br>

<label>

Password

</label>

<br><br>

<input
type="password"
name="password"
required>

<br><br>

<label>

Confirm Password

</label>

<br><br>

<input
type="password"
name="confirm_password"
required>

<br><br>

<button type="submit">

Register

</button>

</form>

<br>

<p style="text-align:center;">

Already have an account?

<a href="{{ url_for('login') }}">

Login here

</a>

</p>

{% endblock %}
